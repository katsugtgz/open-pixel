name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm test
      - name: AI game smoke test
        run: npm run test:game:ai
      - name: Upload AI game smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-game-smoke
          path: artifacts/ai-game-smoke
          if-no-files-found: ignore
      - run: npm run build
      - name: React Doctor
        run: npx react-doctor@0.5.2 ./apps/web --no-score --blocking none --yes
